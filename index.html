<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WishingWillowMC</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:
    radial-gradient(circle at top left,#ead9ff 0%,transparent 30%),
    radial-gradient(circle at top right,#dfffd8 0%,transparent 30%),
    linear-gradient(#fffdf8,#f9f4ff);

    color:#44345c;
}

.wrapper{
    width:min(1100px,95%);
    margin:auto;
}

header{
    text-align:center;
    padding:35px 0;
}

header img{
    width:100%;
    max-width:950px;
}

.hero{

    background:white;
    border-radius:25px;
    padding:50px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);

    text-align:center;
}

h1{

    margin-top:0;

    font-family:Georgia;

    font-size:52px;

    background:linear-gradient(90deg,#8b54ff,#d36dff,#62d06f);

    -webkit-background-clip:text;

    color:transparent;

}

.tagline{

    font-size:22px;

    color:#6f6682;

    max-width:700px;

    margin:auto;

    line-height:1.6;

}

.serverbox{

    display:inline-flex;

    margin-top:35px;

    background:#faf7ff;

    border:2px solid #d7b9ff;

    border-radius:999px;

    overflow:hidden;

}

.serverbox span{

    padding:18px 25px;

    font-weight:bold;

}

.serverbox button{

    border:0;

    background:#8b54ff;

    color:white;

    padding:18px 25px;

    cursor:pointer;

}

.buttons{

    margin-top:40px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:15px;

}

.buttons a{

    text-decoration:none;

    color:white;

    padding:22px;

    border-radius:18px;

    font-weight:bold;

    transition:.2s;

}

.buttons a:hover{

    transform:translateY(-3px);

}

.discord{background:#7c5cff;}

.vote{background:#64be5b;}

.map{background:#54bfc5;}

.store{background:#efc75c;color:#443000!important;}

@media(max-width:800px){

.buttons{

grid-template-columns:1fr 1fr;

}

}

@media(max-width:550px){

.buttons{

grid-template-columns:1fr;

}

.serverbox{

display:flex;

flex-direction:column;

border-radius:20px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<header>

<img src="WWMC_BANNER.gif">

</header>

<section class="hero">

<h1>A little magic.<br>A lot of adventure.</h1>

<p class="tagline">

Friendly survival with earnable ranks, custom items, community events,

and a welcoming place to build your next home.

</p>

<div class="serverbox">

<span id="ip">play.wishingwillowmc.net</span>

<button onclick="copyIP()">Copy IP</button>

</div>

<div class="buttons">

<a class="discord" href="https://discord.gg/ncvGB9KYyT">💜 Join Discord</a>

<a class="vote" href="vote.html">🗳 Vote</a>

<a class="map" href="#">🗺 Live Map<br><small>Coming Soon</small></a>

<a class="store" href="#">🛒 Store<br><small>Coming Soon</small></a>

</div>

</section>

</div>

<script>

function copyIP(){

navigator.clipboard.writeText(

document.getElementById("ip").innerText

);

alert("Server IP copied!");

}

</script>

</body>

</html>
